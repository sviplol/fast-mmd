name: Build Fast MMD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  YLOGIN: ${{ secrets.LANZOU_YLOGIN }}
  PHPDISK_INFO: ${{ secrets.LANZOU_PHPDISK_INFO }}
  FASTMODELS_FID: ${{ secrets.FASTMODELS_FID }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            artifact_name: "一键部署安装版Windows.exe"
            artifact_glob: "src-tauri/target/release/bundle/nsis/*.exe"
            upload_lanzou: false
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            artifact_name: "一键部署Mac M芯片.dmg"
            artifact_glob: "src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg"
            rust_target: "aarch64-apple-darwin"
            upload_lanzou: true
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            artifact_name: "一键部署Mac英特尔芯片.dmg"
            artifact_glob: "src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg"
            rust_target: "x86_64-apple-darwin"
            upload_lanzou: true

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        run: npx tauri build ${{ matrix.args }}

      - name: Rename artifact
        shell: bash
        run: |
          mkdir -p upload
          cp ${{ matrix.artifact_glob }} upload/"${{ matrix.artifact_name }}"
          ls -la upload/

      - name: Upload to artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: upload/

      - name: Upload to Lanzou Cloud
        if: ${{ matrix.upload_lanzou }}
        shell: bash
        env:
          YLOGIN: ${{ env.YLOGIN }}
          PHPDISK_INFO: ${{ env.PHPDISK_INFO }}
          FASTMODELS_FID: ${{ env.FASTMODELS_FID }}
          PYTHONUTF8: "1"
        run: |
          python3 .github/scripts/lanzou_upload.py upload/
