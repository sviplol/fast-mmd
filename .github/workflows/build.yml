name: Build Fast MMD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  YLOGIN: ${{ secrets.LANZOU_YLOGIN }}
  PHPDISK_INFO: ${{ secrets.LANZOU_PHPDISK_INFO }}
  FASTMODELS_FID: ${{ secrets.FASTMODELS_FID }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            artifact_name: "Fast-MMD-Windows-Setup.exe"
            artifact_glob: "src-tauri/target/release/bundle/nsis/*.exe"
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            artifact_name: "Fast-MMD-Mac-ARM.dmg"
            artifact_glob: "src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg"
          - platform: macos-13
            args: "--target x86_64-apple-darwin"
            artifact_name: "Fast-MMD-Mac-Intel.dmg"
            artifact_glob: "src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || matrix.platform == 'macos-13' && 'x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        run: npx tauri build ${{ matrix.args }}

      - name: Rename artifact
        shell: bash
        run: |
          mkdir -p upload
          cp ${{ matrix.artifact_glob }} upload/"${{ matrix.artifact_name }}"
          ls -la upload/

      - name: Upload to artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: upload/

      - name: Upload to Lanzou Cloud
        shell: bash
        env:
          YLOGIN: ${{ env.YLOGIN }}
          PHPDISK_INFO: ${{ env.PHPDISK_INFO }}
          FASTMODELS_FID: ${{ env.FASTMODELS_FID }}
        run: |
          pip3 install requests -q 2>/dev/null || true
          python3 -c "
          import os, sys, time, requests, glob

          ylogin = os.environ.get('YLOGIN', '')
          phpdisk_info = os.environ.get('PHPDISK_INFO', '')
          folder_id = os.environ.get('FASTMODELS_FID', '')

          if not ylogin or not phpdisk_info or not folder_id:
              print('Missing secrets, skip upload')
              sys.exit(0)

          # Find the file
          files = glob.glob('upload/*')
          if not files:
              print('No file to upload')
              sys.exit(1)

          filepath = files[0]
          filename = os.path.basename(filepath)
          filesize = os.path.getsize(filepath)
          print(f'Uploading {filename} ({filesize} bytes) to Fastmodels folder {folder_id}')

          s = requests.Session()
          s.headers['User-Agent'] = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36'
          s.headers['Cookie'] = f'ylogin={ylogin}; phpdisk_info={phpdisk_info}'
          s.headers['Referer'] = 'https://pc.woozooo.com/mydisk.php'

          with open(filepath, 'rb') as f:
              r = s.post('https://pc.woozooo.com/html5up.php',
                  data={
                      'task': 1,
                      'vie': 2,
                      've': 2,
                      'folder_id': folder_id,
                      'id': 'WU_FILE_0',
                      'name': filename,
                      'type': 'application/octet-stream',
                      'lastModifiedDate': time.strftime('%a %b %d %Y %H:%M:%S GMT+0800'),
                      'size': str(filesize),
                  },
                  files={'upload_file': (filename, f, 'application/octet-stream')},
                  timeout=600,
              )

          print(f'Status: {r.status_code}')
          print(f'Response: {r.text[:500]}')

          try:
              result = r.json()
              if result.get('zt') == 1:
                  print(f'Upload success! File ID: {result.get(\"text\", [{}])[0].get(\"f_id\", \"\")}')
              else:
                  print(f'Upload failed: {result.get(\"info\")}')
                  sys.exit(1)
          except Exception as e:
              print(f'Parse error: {e}')
              sys.exit(1)
          "
