name: Build Fast MMD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  YLOGIN: ${{ secrets.LANZOU_YLOGIN }}
  PHPDISK_INFO: ${{ secrets.LANZOU_PHPDISK_INFO }}
  FASTMODELS_FID: ${{ secrets.FASTMODELS_FID }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            artifact_name: "Windows安装版"
            artifact_glob: "src-tauri/target/release/bundle/nsis/*.exe"
            upload_lanzou: false
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            artifact_name: "【Mac M芯片】一键部署"
            artifact_glob: "src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg"
            rust_target: "aarch64-apple-darwin"
            upload_lanzou: true
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            artifact_name: "【Mac英特尔芯片】一键部署"
            artifact_glob: "src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg"
            rust_target: "x86_64-apple-darwin"
            upload_lanzou: true

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: ver
        shell: bash
        run: |
          VER=$(python3 -c "import json; print(json.load(open('version.json'))['version'])")
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Version: v$VER"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        run: npx tauri build ${{ matrix.args }}

      - name: Rename artifact
        shell: bash
        run: |
          mkdir -p upload
          EXT="${{ matrix.platform == 'windows-latest' && 'exe' || 'dmg' }}"
          FILENAME="${{ matrix.artifact_name }}_v${{ steps.ver.outputs.version }}.$EXT"
          cp ${{ matrix.artifact_glob }} "upload/$FILENAME"
          # Windows: 额外生成免安装版(直接exe, 推荐)
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            cp src-tauri/target/release/fast-mmd.exe "upload/【推荐】Windows免安装版_v${{ steps.ver.outputs.version }}.exe"
          fi
          # Mac: 清除隔离属性, 防止"已损坏"提示
          if [ "${{ matrix.platform }}" = "macos-latest" ]; then
            echo "Clearing quarantine attributes..."
            DMG_FILE="upload/$FILENAME"
            # 方案1: 直接清除dmg文件的扩展属性
            xattr -cr "$DMG_FILE"
            # 方案2: 挂载dmg, 清除app属性, 创建新dmg
            TEMP_DIR=$(mktemp -d)
            MOUNT_POINT=$(hdiutil attach "$DMG_FILE" -nobrowse -quiet | tail -1 | awk '{$1=$2=$3=""; print substr($0,4)}')
            if [ -n "$MOUNT_POINT" ]; then
              APP_PATH=$(find "$MOUNT_POINT" -name "*.app" -maxdepth 2 | head -1)
              if [ -n "$APP_PATH" ]; then
                xattr -cr "$APP_PATH"
                echo "Cleared xattr for: $APP_PATH"
              fi
              # 复制内容到临时目录, 重新打包dmg
              cp -R "$MOUNT_POINT"/* "$TEMP_DIR/"
              hdiutil detach "$MOUNT_POINT" -quiet
              # 重新创建dmg (不带签名, 不带quarantine)
              rm -f "$DMG_FILE"
              hdiutil create -volname "FastMMD" -srcfolder "$TEMP_DIR" -ov -format UDZO "$DMG_FILE" -quiet
              xattr -cr "$DMG_FILE"
              echo "Rebuilt DMG without quarantine"
              rm -rf "$TEMP_DIR"
            fi
          fi
          # Mac M芯片和英特尔都打包修复脚本
          if [ "${{ matrix.platform }}" = "macos-latest" ]; then
            cp mac-fix-damaged.command "upload/Mac已损坏修复.command"
          fi
          ls -la upload/

      - name: Upload to artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: upload/

      - name: Upload to Lanzou Cloud
        id: lanzou
        if: ${{ matrix.upload_lanzou }}
        continue-on-error: true
        shell: bash
        env:
          YLOGIN: ${{ env.YLOGIN }}
          PHPDISK_INFO: ${{ env.PHPDISK_INFO }}
          FASTMODELS_FID: ${{ env.FASTMODELS_FID }}
          PYTHONUTF8: "1"
        run: |
          python3 .github/scripts/lanzou_upload.py upload upload/ 2>&1 || echo "::warning::Lanzou upload failed, artifact still available in GitHub Actions"
